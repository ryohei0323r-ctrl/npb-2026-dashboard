<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b5d75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NPB Status">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>NPB Team Status</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f8;
      --surface: #ffffff;
      --panel: #edf3f5;
      --ink: #1d2429;
      --muted: #63707a;
      --line: #d9e1e5;
      --accent: #0b5d75;
      --accent-soft: #dcecf1;
      --hot: #b93434;
      --good: #147449;
      --warn: #9f6a12;
      --shadow: 0 10px 24px rgba(22, 35, 44, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      letter-spacing: 0;
    }
    header {
      padding: 18px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .home-link, .detail-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--accent);
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }
    h1 { margin: 0 0 6px; font-size: 21px; line-height: 1.25; }
    .submeta { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .controls {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 10px 12px;
      background: rgba(245, 247, 248, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .control-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 8px;
      max-width: 1020px;
      margin: 0 auto;
    }
    label { display: grid; gap: 4px; color: var(--muted); font-size: 11px; font-weight: 800; }
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      padding: 7px 28px 7px 9px;
      font-size: 14px;
    }
    main { width: min(100%, 1020px); margin: 0 auto; padding: 14px 12px 28px; }
    .period-presets {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 0 0 10px;
      scrollbar-width: none;
    }
    .period-presets::-webkit-scrollbar { display: none; }
    .period-presets button {
      flex: 0 0 auto;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 900;
    }
    .period-presets button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .hero {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }
    .team-row { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .team-name { font-size: 22px; font-weight: 900; line-height: 1.18; }
    .period { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }
    .summary-card {
      background: var(--panel);
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
    }
    .summary-card span { display: block; color: var(--muted); font-size: 11px; font-weight: 800; }
    .summary-card b { display: block; margin-top: 2px; font-size: 21px; font-variant-numeric: tabular-nums; }
    .recent-games {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .recent-label { color: var(--muted); font-size: 11px; font-weight: 900; }
    .game-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 28px;
      padding: 4px 7px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .game-chip b { font-size: 14px; }
    .game-chip.win b { color: var(--hot); }
    .game-chip.loss b { color: var(--accent); }
    .comparison-block {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .comparison-head { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
    .comparison-title { font-size: 12px; font-weight: 900; }
    .comparison-period { color: var(--muted); font-size: 10px; text-align: right; }
    .comparison-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 7px; margin-top: 8px; }
    .trend-item { min-width: 0; padding: 8px; border-radius: 7px; background: var(--panel); }
    .trend-item span { display: block; color: var(--muted); font-size: 10px; font-weight: 800; }
    .trend-item b { display: block; margin-top: 2px; font-size: 15px; font-variant-numeric: tabular-nums; }
    .trend-item b.up { color: var(--good); }
    .trend-item b.down { color: var(--hot); }
    .view-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0 2px;
    }
    .view-toggle button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 15px;
      font-weight: 900;
    }
    .view-toggle button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .sort-bar {
      display: grid;
      grid-template-columns: minmax(0, 320px) auto 1fr;
      gap: 10px;
      align-items: end;
      margin: 10px 0 2px;
    }
    .active-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 13px;
      white-space: nowrap;
    }
    .active-toggle input { width: 18px; height: 18px; margin: 0; accent-color: var(--accent); }
    .sort-note { color: var(--muted); font-size: 12px; padding-bottom: 10px; }
    .player-panel.hidden { display: none; }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin: 18px 2px 8px;
    }
    h2 { margin: 0; font-size: 17px; }
    .hint { color: var(--muted); font-size: 12px; }
    .cards { display: grid; gap: 10px; }
    .player-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
    }
    .topline {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }
    .name { font-size: 18px; font-weight: 900; line-height: 1.2; overflow-wrap: anywhere; }
    .role { margin-top: 4px; color: var(--muted); font-size: 12px; }
    .tag {
      min-height: 26px;
      border-radius: 999px;
      padding: 5px 8px;
      background: var(--panel);
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .tag.hot { background: #f8e6e6; color: var(--hot); }
    .tag.good { background: #e1f1e9; color: var(--good); }
    .tag.warn { background: #f7ecd9; color: var(--warn); }
    .meter { margin-top: 10px; height: 8px; border-radius: 999px; background: var(--panel); overflow: hidden; }
    .meter > i { display: block; height: 100%; border-radius: inherit; background: var(--accent); }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-top: 11px;
    }
    .stat { min-width: 0; padding: 8px 7px; background: var(--panel); border-radius: 8px; }
    .stat span { display: block; color: var(--muted); font-size: 10px; font-weight: 800; white-space: nowrap; }
    .stat b { display: block; margin-top: 2px; font-size: 15px; font-variant-numeric: tabular-nums; overflow-wrap: anywhere; }
    .card-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
    .empty {
      padding: 24px 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 560px) {
      .control-grid { grid-template-columns: 1fr 1fr; }
      .control-grid label:first-child { grid-column: 1 / -1; }
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .sort-bar { grid-template-columns: 1fr; gap: 4px; }
      .sort-note { padding: 0 2px; }
      .comparison-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (min-width: 780px) {
      header { padding-inline: 24px; }
      .controls { padding-inline: 24px; }
      .summary-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>チーム選手状況</h1>
        <div class="submeta">取得: 2026-07-23 21:28:38<br>HTML生成: 2026-07-23 21:54:46</div>
      </div>
      <a class="home-link" href="/">ホーム</a>
    </div>
  </header>

  <section class="controls">
    <div class="control-grid">
      <label>チーム<select id="team"></select></label>
      <label>開始日<select id="startDate"></select></label>
      <label>終了日<select id="endDate"></select></label>
    </div>
  </section>

  <main>
    <div class="period-presets" aria-label="期間の選択">
      <button type="button" data-period="7">直近7日</button>
      <button type="button" data-period="14">直近14日</button>
      <button type="button" data-period="30">直近30日</button>
      <button type="button" data-period="season">今季（履歴）</button>
    </div>

    <section class="hero">
      <div class="team-row">
        <div>
          <div id="teamName" class="team-name"></div>
          <div id="period" class="period"></div>
        </div>
        <div id="league" class="pill"></div>
      </div>
      <div id="summary" class="summary-grid"></div>
      <div id="recentGames" class="recent-games"></div>
      <div id="comparison" class="comparison-block"></div>
    </section>

    <div class="view-toggle" aria-label="選手区分">
      <button type="button" id="batterViewBtn" class="active">打者</button>
      <button type="button" id="pitcherViewBtn">投手</button>
    </div>

    <div class="sort-bar">
      <label>並べ替え<select id="sortOrder"></select></label>
      <label class="active-toggle"><input id="activeOnly" type="checkbox">期間中に出場した選手のみ</label>
      <div id="sortNote" class="sort-note"></div>
    </div>

    <section id="batterPanel" class="player-panel">
      <div class="section-head">
        <h2>打者の起用と調子</h2>
        <div id="batterSortHint" class="hint"></div>
      </div>
      <div id="batters" class="cards"></div>
    </section>

    <section id="pitcherPanel" class="player-panel hidden">
      <div class="section-head">
        <h2>投手の起用と調子</h2>
        <div id="pitcherSortHint" class="hint"></div>
      </div>
      <div id="pitchers" class="cards"></div>
    </section>
  </main>

  <script src="npb-data.js"></script>
  <script>
    const DATA = Object.assign({},window.NPB_DATA,{"defaultTeam":"北海道日本ハムファイターズ","options":{"teams":["オリックス・バファローズ","中日ドラゴンズ","北海道日本ハムファイターズ","千葉ロッテマリーンズ","埼玉西武ライオンズ","広島東洋カープ","東京ヤクルトスワローズ","東北楽天ゴールデンイーグルス","横浜DeNAベイスターズ","福岡ソフトバンクホークス","読売ジャイアンツ","阪神タイガース"],"dates":["2026-07-05","2026-07-07","2026-07-08","2026-07-09","2026-07-11","2026-07-12","2026-07-13","2026-07-14","2026-07-16","2026-07-17","2026-07-18","2026-07-19","2026-07-21","2026-07-23"]},"games":[],"gameCoverage":[]});
    const state = {
      team: DATA.defaultTeam,
      startDate: DATA.options.dates.length > 1 ? DATA.options.dates.at(-2) : DATA.options.dates.at(-1),
      endDate: DATA.options.dates.at(-1),
      view: "打者",
      sortOrder: "好調順",
      preset: "custom",
      activeOnly: false
    };
    const BATTER_SORTS = [
      "好調順", "期間OPSが高い順", "累積OPSが高い順", "期間打席が多い順",
      "累積打席が多い順", "本塁打が多い順", "選手名順"
    ];
    const PITCHER_SORTS = [
      "好調順", "期間防御率が低い順", "累積防御率が低い順", "期間投球回が多い順",
      "累積投球回が多い順", "累積WHIPが低い順", "期間K-BB%が高い順", "選手名順"
    ];
    const $ = (id) => document.getElementById(id);
    const num = (value) => Number.isFinite(Number(value)) ? Number(value) : 0;
    const div = (a, b) => num(b) === 0 ? null : num(a) / num(b);
    const playerKey = (row) => `${row.name}|${row.team}|${row.league}`;

    function optionList(select, values, selected) {
      select.innerHTML = "";
      const options = selected && !values.includes(selected) ? [...values, selected].sort() : values;
      options.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        if (value === selected) option.selected = true;
        select.appendChild(option);
      });
    }
    function fmtRate(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      return n.toFixed(3).replace(/^0/, "");
    }
    function fmt2(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      return n.toFixed(2);
    }
    function fmtPct(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      return (n * 100).toFixed(1) + "%";
    }
    function fmtInt(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      return Math.round(n).toString();
    }
    function fmtWinPct(wins, losses) {
      const value = div(wins, num(wins) + num(losses));
      return value === null ? "---" : value.toFixed(3).replace(/^0/, "");
    }
    function fmtPlain(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "number" && Number.isInteger(value)) return String(value);
      return String(value);
    }
    function inningsText(ip) {
      const outs = Math.round(num(ip) * 3);
      const whole = Math.floor(outs / 3);
      const rest = outs % 3;
      return rest === 0 ? String(whole) : `${whole}.${rest}`;
    }

    function nearestDateOnOrBefore(target) {
      const dates = DATA.options.dates.filter((d) => d <= target);
      return dates.length ? dates[dates.length - 1] : "";
    }
    function previousDateBefore(target) {
      const dates = DATA.options.dates.filter((d) => d < target);
      return dates.length ? dates[dates.length - 1] : "";
    }
    function addDays(dateText, amount) {
      if (!dateText) return "";
      const [year, month, day] = dateText.split("-").map(Number);
      const value = new Date(Date.UTC(year, month - 1, day));
      value.setUTCDate(value.getUTCDate() + amount);
      return value.toISOString().slice(0, 10);
    }
    function inclusiveDays(startDate, endDate) {
      const start = Date.parse(`${startDate}T00:00:00Z`);
      const end = Date.parse(`${endDate}T00:00:00Z`);
      return Number.isFinite(start) && Number.isFinite(end) ? Math.floor((end - start) / 86400000) + 1 : 0;
    }
    function previousPeriodRange(startDate, endDate) {
      const days = inclusiveDays(startDate, endDate);
      const previousEnd = addDays(startDate, -1);
      return {start: addDays(previousEnd, -(days - 1)), end: previousEnd, days};
    }
    function setPeriodPreset(preset) {
      state.preset = preset;
      if (preset === "season") {
        state.startDate = DATA.options.dates[0] || state.endDate;
      } else {
        const days = Number(preset);
        const target = addDays(state.endDate, -(days - 1));
        const earliest = DATA.options.dates[0] || state.endDate;
        state.startDate = target >= earliest ? target : earliest;
      }
      render();
    }
    function baselineDateFor(target) {
      return previousDateBefore(target) || nearestDateOnOrBefore(target);
    }
    function snapshot(rows, dateKey, team) {
      const map = new Map();
      if (!dateKey) return map;
      rows
        .filter((row) => row.date === dateKey && row.team === team)
        .forEach((row) => map.set(playerKey(row), row));
      return map;
    }
    function diffRowsByKeys(rows, team, startKey, endKey, diffColumns) {
      const end = snapshot(rows, endKey, team);
      const start = snapshot(rows, startKey, team);
      const result = [];
      end.forEach((row, key) => {
        const base = start.get(key) || {};
        const item = {...row};
        diffColumns.forEach((col) => item[col] = num(row[col]) - num(base[col]));
        result.push(item);
      });
      return result;
    }
    function diffRows(rows, team, startDate, endDate, diffColumns) {
      const startKey = baselineDateFor(startDate);
      const endKey = nearestDateOnOrBefore(endDate);
      return diffRowsByKeys(rows, team, startKey, endKey, diffColumns);
    }
    function currentRows(rows, team) {
      const endKey = nearestDateOnOrBefore(state.endDate);
      return Array.from(snapshot(rows, endKey, team).values());
    }
    function detailUrl(kind, row) {
      const params = new URLSearchParams({
        kind,
        name: row.name || "",
        team: row.team || "",
        start: state.startDate || "",
        end: state.endDate || ""
      });
      return `/player-detail.html?${params.toString()}`;
    }

    function calcBatter(row) {
      const avg = div(row.h, row.ab);
      const slg = div(row.tb, row.ab);
      const obp = div(num(row.h) + num(row.bb) + num(row.hbp), num(row.ab) + num(row.bb) + num(row.hbp) + num(row.sf));
      const ops = obp === null || slg === null ? null : obp + slg;
      const bbp = div(row.bb, row.pa);
      const kp = div(row.so, row.pa);
      return {...row, avg, slg, obp, ops, bbp, kp};
    }
    function calcPitcher(row) {
      const era = div(num(row.er) * 9, row.ip);
      const whip = div(num(row.h) + num(row.bb), row.ip);
      const k9 = div(num(row.so) * 9, row.ip);
      const bb9 = div(num(row.bb) * 9, row.ip);
      const kbbPct = div(num(row.so) - num(row.bb), row.bf);
      return {...row, era, whip, k9, bb9, kbbPct, ipText: inningsText(row.ip)};
    }
    function teamBatterTotals(rows) {
      const t = rows.reduce((acc, row) => {
        ["pa", "ab", "h", "tb", "bb", "hbp", "sf", "hr", "rbi", "r"].forEach((k) => acc[k] += num(row[k]));
        return acc;
      }, {pa: 0, ab: 0, h: 0, tb: 0, bb: 0, hbp: 0, sf: 0, hr: 0, rbi: 0, r: 0});
      const obp = div(t.h + t.bb + t.hbp, t.ab + t.bb + t.hbp + t.sf);
      const slg = div(t.tb, t.ab);
      return {...t, avg: div(t.h, t.ab), obp, slg, ops: obp === null || slg === null ? null : obp + slg};
    }
    function teamPitcherTotals(rows) {
      const t = rows.reduce((acc, row) => {
        ["ip", "er", "h", "bb", "so", "hr", "w", "loss", "sv", "hold"].forEach((k) => acc[k] += num(row[k]));
        return acc;
      }, {ip: 0, er: 0, h: 0, bb: 0, so: 0, hr: 0, w: 0, loss: 0, sv: 0, hold: 0});
      return {...t, era: div(t.er * 9, t.ip), whip: div(t.h + t.bb, t.ip), k9: div(t.so * 9, t.ip)};
    }

    function batterStatus(season, period, maxPa) {
      if (num(period.pa) >= 8 && Number(period.ops) >= .900) return ["好調", "hot"];
      if (num(period.pa) >= 8 && Number(period.ops) <= .550) return ["下降気味", "warn"];
      if (num(period.pa) >= 5 && num(season.pa) < 80) return ["出番増", "good"];
      if (num(season.pa) >= maxPa * .65) return ["主力", ""];
      return ["通常", ""];
    }
    function pitcherStatus(season, period) {
      if (num(period.ip) >= 5 && Number(period.era) <= 2.50) return ["好投", "hot"];
      if (num(period.ip) > 0 && Number(period.era) >= 6.00) return ["要注意", "warn"];
      if (num(period.ip) >= 5) return ["先発稼働", ""];
      if (num(period.ip) >= 2) return ["登板多め", "good"];
      if (num(season.ip) >= 30) return ["主力", ""];
      return ["通常", ""];
    }

    function compareMetric(a, b, ascending = false) {
      const aNumber = Number(a);
      const bNumber = Number(b);
      const aValid = a !== null && a !== undefined && a !== "" && Number.isFinite(aNumber);
      const bValid = b !== null && b !== undefined && b !== "" && Number.isFinite(bNumber);
      if (!aValid && !bValid) return 0;
      if (!aValid) return 1;
      if (!bValid) return -1;
      return ascending ? aNumber - bNumber : bNumber - aNumber;
    }
    function sortBatters(items, maxPa) {
      const statusRank = {"好調": 5, "出番増": 4, "主力": 3, "通常": 2, "下降気味": 1};
      return items.sort((a, b) => {
        let compared = 0;
        if (state.sortOrder === "好調順") {
          compared = num(statusRank[batterStatus(b.season, b.period, maxPa)[0]]) - num(statusRank[batterStatus(a.season, a.period, maxPa)[0]]);
          if (!compared) compared = compareMetric(a.period.ops, b.period.ops);
        } else if (state.sortOrder === "期間OPSが高い順") compared = compareMetric(a.period.ops, b.period.ops);
        else if (state.sortOrder === "累積OPSが高い順") compared = compareMetric(a.season.ops, b.season.ops);
        else if (state.sortOrder === "期間打席が多い順") compared = compareMetric(a.period.pa, b.period.pa);
        else if (state.sortOrder === "累積打席が多い順") compared = compareMetric(a.season.pa, b.season.pa);
        else if (state.sortOrder === "本塁打が多い順") compared = compareMetric(a.season.hr, b.season.hr);
        else if (state.sortOrder === "選手名順") compared = String(a.season.name).localeCompare(String(b.season.name), "ja");
        return compared || compareMetric(a.season.pa, b.season.pa) || String(a.season.name).localeCompare(String(b.season.name), "ja");
      });
    }
    function sortPitchers(items) {
      const statusRank = {"好投": 6, "登板多め": 5, "先発稼働": 4, "主力": 3, "通常": 2, "要注意": 1};
      return items.sort((a, b) => {
        let compared = 0;
        if (state.sortOrder === "好調順") {
          compared = num(statusRank[pitcherStatus(b.season, b.period)[0]]) - num(statusRank[pitcherStatus(a.season, a.period)[0]]);
          if (!compared) compared = compareMetric(a.period.era, b.period.era, true);
        } else if (state.sortOrder === "期間防御率が低い順") compared = compareMetric(a.period.era, b.period.era, true);
        else if (state.sortOrder === "累積防御率が低い順") compared = compareMetric(a.season.era, b.season.era, true);
        else if (state.sortOrder === "期間投球回が多い順") compared = compareMetric(a.period.ip, b.period.ip);
        else if (state.sortOrder === "累積投球回が多い順") compared = compareMetric(a.season.ip, b.season.ip);
        else if (state.sortOrder === "累積WHIPが低い順") compared = compareMetric(a.season.whip, b.season.whip, true);
        else if (state.sortOrder === "期間K-BB%が高い順") compared = compareMetric(a.period.kbbPct, b.period.kbbPct);
        else if (state.sortOrder === "選手名順") compared = String(a.season.name).localeCompare(String(b.season.name), "ja");
        return compared || compareMetric(a.season.ip, b.season.ip) || String(a.season.name).localeCompare(String(b.season.name), "ja");
      });
    }

    function monthKeysBetween(startDate, endDate) {
      if (!startDate || !endDate || startDate > endDate) return [];
      let year = Number(startDate.slice(0, 4));
      let month = Number(startDate.slice(5, 7));
      const endYear = Number(endDate.slice(0, 4));
      const endMonth = Number(endDate.slice(5, 7));
      const keys = [];
      while (year < endYear || (year === endYear && month <= endMonth)) {
        keys.push(`${year}-${String(month).padStart(2, "0")}`);
        month += 1;
        if (month === 13) { year += 1; month = 1; }
      }
      return keys;
    }
    function officialGamesForRange(startDate, endDate) {
      const coverage = new Set(DATA.gameCoverage || []);
      const complete = monthKeysBetween(startDate, endDate)
        .every((month) => coverage.has(`${state.team}|${month}`));
      if (!complete) return null;
      return (DATA.games || []).filter((game) =>
        game.team === state.team && game.date >= startDate && game.date <= endDate
      );
    }
    function officialPeriodGames() {
      return officialGamesForRange(state.startDate, state.endDate);
    }
    function recentOfficialGames() {
      return (DATA.games || [])
        .filter((game) => game.team === state.team && game.date <= state.endDate)
        .sort((a, b) => a.date.localeCompare(b.date))
        .slice(-5);
    }
    function gameRecord(games) {
      return games.reduce((record, game) => {
        if (game.result === "○") record.w += 1;
        else if (game.result === "●") record.loss += 1;
        else if (game.result === "△") record.draw += 1;
        return record;
      }, {w: 0, loss: 0, draw: 0});
    }

    function recordText(record) {
      const draw = num(record.draw) > 0 ? ` ${fmtInt(record.draw)}分` : "";
      return `${fmtInt(record.w)}勝 ${fmtInt(record.loss)}敗${draw}`;
    }
    function signedDelta(value, digits, rateStyle = false) {
      if (value === null || value === undefined || value === "") return "---";
      const number = Number(value);
      if (!Number.isFinite(number)) return "---";
      const prefix = number > 0 ? "+" : number === 0 ? "±" : "";
      let text = `${prefix}${number.toFixed(digits)}`;
      if (rateStyle) text = text.replace("+0.", "+.").replace("-0.", "-.").replace("±0.", "±.");
      return text;
    }
    function metricDelta(current, previous) {
      if (current === null || current === undefined || previous === null || previous === undefined) return null;
      const currentNumber = Number(current);
      const previousNumber = Number(previous);
      return Number.isFinite(currentNumber) && Number.isFinite(previousNumber) ? currentNumber - previousNumber : null;
    }
    function trendClass(delta, higherIsBetter = true) {
      if (delta === null || delta === undefined || delta === "") return "";
      const value = Number(delta);
      if (!Number.isFinite(value) || value === 0) return "";
      const improved = higherIsBetter ? value > 0 : value < 0;
      return improved ? "up" : "down";
    }
    function renderComparison(currentBt, currentPt, currentRecord, previousBatters, previousPitchers, previousRange, available) {
      if (!available) {
        $("comparison").innerHTML = `
          <div class="comparison-head"><div class="comparison-title">前期間との比較</div></div>
          <div class="hint" style="margin-top:6px">同じ日数を比較するための履歴がまだ足りません。</div>
        `;
        return;
      }
      const previousBt = teamBatterTotals(previousBatters);
      const previousPt = teamPitcherTotals(previousPitchers);
      const officialPrevious = officialGamesForRange(previousRange.start, previousRange.end);
      const previousRecord = officialPrevious === null
        ? {w: Math.max(0, previousPt.w), loss: Math.max(0, previousPt.loss), draw: 0}
        : gameRecord(officialPrevious);
      const currentWinPct = div(currentRecord.w, num(currentRecord.w) + num(currentRecord.loss));
      const previousWinPct = div(previousRecord.w, num(previousRecord.w) + num(previousRecord.loss));
      const metrics = [
        ["OPS", metricDelta(currentBt.ops, previousBt.ops), fmtRate(previousBt.ops) || "---", fmtRate(currentBt.ops) || "---", 3, true, true],
        ["得点", num(currentBt.r) - num(previousBt.r), fmtInt(previousBt.r), fmtInt(currentBt.r), 0, false, true],
        ["ERA", metricDelta(currentPt.era, previousPt.era), fmt2(previousPt.era) || "---", fmt2(currentPt.era) || "---", 2, false, false],
        ["勝率", currentWinPct === null || previousWinPct === null ? null : currentWinPct - previousWinPct,
          previousWinPct === null ? "---" : previousWinPct.toFixed(3).replace(/^0/, ""),
          currentWinPct === null ? "---" : currentWinPct.toFixed(3).replace(/^0/, ""), 3, true, true],
      ];
      $("comparison").innerHTML = `
        <div class="comparison-head">
          <div class="comparison-title">前期間との比較</div>
          <div class="comparison-period">${previousRange.start} 〜 ${previousRange.end}</div>
        </div>
        <div class="comparison-grid">
          ${metrics.map(([label, delta, before, current, digits, rateStyle, higherIsBetter]) => `
            <div class="trend-item">
              <span>${label} 前 ${before} → 今 ${current}</span>
              <b class="${trendClass(delta, higherIsBetter)}">${signedDelta(delta, digits, rateStyle)}</b>
            </div>
          `).join("")}
        </div>
      `;
    }
    function renderRecentGames(games) {
      if (!games.length) {
        $("recentGames").innerHTML = '<span class="recent-label">直近試合</span><span class="hint">公式結果は次回更新時に取得します</span>';
        return;
      }
      const chips = games.map((game) => {
        const cls = game.result === "○" ? "win" : game.result === "●" ? "loss" : "";
        const shortDate = game.date.slice(5).replace("-", "/");
        const opponent = game.opponent ? ` vs ${game.opponent}` : "";
        return `<span class="game-chip ${cls}"><span>${shortDate}</span><b>${game.result}</b><span>${game.score}${opponent}</span></span>`;
      }).join("");
      const source = games.at(-1)?.source || "https://npb.jp/bis/teams/";
      $("recentGames").innerHTML = `<span class="recent-label">直近5試合</span>${chips}<a class="detail-link" href="${source}" target="_blank" rel="noopener">NPB公式</a>`;
    }
    function renderSummary(seasonBatters, periodBatters, seasonPitchers, periodPitchers, recentPitchers, previousBatters, previousPitchers, previousRange, comparisonAvailable) {
      const bt = teamBatterTotals(periodBatters);
      const pt = teamPitcherTotals(periodPitchers);
      const seasonBt = teamBatterTotals(seasonBatters);
      const seasonPt = teamPitcherTotals(seasonPitchers);
      const officialPeriod = officialPeriodGames();
      const periodRecord = officialPeriod === null
        ? {w: Math.max(0, pt.w), loss: Math.max(0, pt.loss), draw: 0}
        : gameRecord(officialPeriod);
      const recentGames = recentOfficialGames();
      const recentTotals = teamPitcherTotals(recentPitchers);
      const recentRecord = recentGames.length
        ? gameRecord(recentGames)
        : {w: Math.max(0, recentTotals.w), loss: Math.max(0, recentTotals.loss), draw: 0};
      const items = [
        ["期間OPS", fmtRate(bt.ops), `累積 ${fmtRate(seasonBt.ops)}`],
        ["期間打席", fmtInt(bt.pa), `HR ${fmtInt(bt.hr)} / RBI ${fmtInt(bt.rbi)}`],
        ["期間ERA", fmt2(pt.era), `累積 ${fmt2(seasonPt.era)}`],
        ["期間投球回", inningsText(pt.ip), `WHIP ${fmt2(pt.whip)}`],
        ["期間勝敗", recordText(periodRecord), `勝率 ${fmtWinPct(periodRecord.w, periodRecord.loss)} / ${officialPeriod === null ? "履歴差分" : "NPB公式"}`],
        [recentGames.length ? "直近5試合" : "最新取得間", recordText(recentRecord), recentGames.length ? "NPB公式試合結果" : "保存済み履歴の差分"],
      ];
      $("summary").innerHTML = items.map(([label, value, sub]) => `
        <div class="summary-card"><span>${label}</span><b>${value}</b><span>${sub}</span></div>
      `).join("");
      renderRecentGames(recentGames);
      renderComparison(bt, pt, periodRecord, previousBatters, previousPitchers, previousRange, comparisonAvailable);
    }

    function renderBatters(seasonRows, periodRows) {
      const periodMap = new Map(periodRows.map((row) => [playerKey(row), calcBatter(row)]));
      const calculated = seasonRows.map((row) => {
        const season = calcBatter(row);
        const period = periodMap.get(playerKey(row)) || calcBatter({...row, pa: 0, ab: 0, h: 0, tb: 0, bb: 0, hbp: 0, sf: 0, hr: 0, rbi: 0, so: 0});
        return {season, period};
      }).filter((item) => num(item.season.pa) > 0 && (!state.activeOnly || num(item.period.pa) > 0));
      const maxPa = Math.max(...calculated.map((item) => num(item.season.pa)), 1);
      const html = sortBatters(calculated, maxPa)
        .map((item) => {
          const [label, cls] = batterStatus(item.season, item.period, maxPa);
          const width = Math.max(4, Math.min(100, num(item.season.pa) / maxPa * 100));
          return `
            <article class="player-card">
              <div class="topline">
                <div>
                  <div class="name">${item.season.name}</div>
                  <div class="role">累積 ${fmtInt(item.season.pa)}打席 / 期間 +${fmtInt(item.period.pa)}打席</div>
                </div>
                <div class="tag ${cls}">${label}</div>
              </div>
              <div class="meter"><i style="width:${width.toFixed(1)}%"></i></div>
              <div class="stats">
                <div class="stat"><span>OPS</span><b>${fmtRate(item.season.ops)}</b></div>
                <div class="stat"><span>期間OPS</span><b>${fmtRate(item.period.ops)}</b></div>
                <div class="stat"><span>HR</span><b>${fmtInt(item.season.hr)}</b></div>
                <div class="stat"><span>期間RBI</span><b>${fmtInt(item.period.rbi)}</b></div>
              </div>
              <div class="card-actions"><a class="detail-link" href="${detailUrl("batter", item.season)}">詳しい成績</a></div>
            </article>
          `;
        }).join("");
      $("batters").innerHTML = html || '<div class="empty">表示できる打者データがありません。</div>';
    }

    function renderPitchers(seasonRows, periodRows) {
      const periodMap = new Map(periodRows.map((row) => [playerKey(row), calcPitcher(row)]));
      const calculated = seasonRows.map((row) => {
        const season = calcPitcher(row);
        const period = periodMap.get(playerKey(row)) || calcPitcher({...row, g: 0, ip: 0, er: 0, h: 0, bb: 0, so: 0, bf: 0, hr: 0});
        return {season, period};
      }).filter((item) => num(item.season.ip) > 0 && (!state.activeOnly || num(item.period.g) > 0 || num(item.period.ip) > 0));
      const maxIp = Math.max(...calculated.map((item) => num(item.season.ip)), 1);
      const html = sortPitchers(calculated)
        .map((item) => {
          const [label, cls] = pitcherStatus(item.season, item.period);
          const width = Math.max(4, Math.min(100, num(item.season.ip) / maxIp * 100));
          return `
            <article class="player-card">
              <div class="topline">
                <div>
                  <div class="name">${item.season.name}</div>
                  <div class="role">累積 ${inningsText(item.season.ip)}回 / 期間 +${inningsText(item.period.ip)}回</div>
                </div>
                <div class="tag ${cls}">${label}</div>
              </div>
              <div class="meter"><i style="width:${width.toFixed(1)}%"></i></div>
              <div class="stats">
                <div class="stat"><span>ERA</span><b>${fmt2(item.season.era)}</b></div>
                <div class="stat"><span>期間ERA</span><b>${fmt2(item.period.era)}</b></div>
                <div class="stat"><span>WHIP</span><b>${fmt2(item.season.whip)}</b></div>
                <div class="stat"><span>K-BB%</span><b>${fmtPct(item.period.kbbPct)}</b></div>
              </div>
              <div class="card-actions"><a class="detail-link" href="${detailUrl("pitcher", item.season)}">詳しい成績</a></div>
            </article>
          `;
        }).join("");
      $("pitchers").innerHTML = html || '<div class="empty">表示できる投手データがありません。</div>';
    }

    function render() {
      optionList($("team"), DATA.options.teams, state.team);
      optionList($("startDate"), DATA.options.dates, state.startDate);
      optionList($("endDate"), DATA.options.dates, state.endDate);
      const sortOptions = state.view === "打者" ? BATTER_SORTS : PITCHER_SORTS;
      if (!sortOptions.includes(state.sortOrder)) state.sortOrder = "好調順";
      optionList($("sortOrder"), sortOptions, state.sortOrder);
      const endKey = nearestDateOnOrBefore(state.endDate);
      const startKey = baselineDateFor(state.startDate);
      const batterDiffCols = ["g", "pa", "ab", "r", "h", "d2", "d3", "hr", "tb", "rbi", "sb", "cs", "sh", "sf", "bb", "ibb", "hbp", "so", "gdp"];
      const pitcherDiffCols = ["g", "w", "loss", "sv", "hold", "hp", "cg", "sho", "nobb", "bf", "ip", "h", "hr", "bb", "ibb", "hbp", "so", "wp", "bk", "r", "er"];
      const seasonBatters = currentRows(DATA.batters, state.team);
      const seasonPitchers = currentRows(DATA.pitchers, state.team);
      const periodBatters = diffRows(DATA.batters, state.team, state.startDate, state.endDate, batterDiffCols);
      const periodPitchers = diffRows(DATA.pitchers, state.team, state.startDate, state.endDate, pitcherDiffCols);
      const previousRange = previousPeriodRange(state.startDate, state.endDate);
      const comparisonAvailable = Boolean(
        previousRange.days > 0 && previousDateBefore(previousRange.start) && nearestDateOnOrBefore(previousRange.end)
      );
      const previousBatters = comparisonAvailable
        ? diffRows(DATA.batters, state.team, previousRange.start, previousRange.end, batterDiffCols)
        : [];
      const previousPitchers = comparisonAvailable
        ? diffRows(DATA.pitchers, state.team, previousRange.start, previousRange.end, pitcherDiffCols)
        : [];
      const previousEndKey = previousDateBefore(endKey);
      const recentPitchers = previousEndKey
        ? diffRowsByKeys(DATA.pitchers, state.team, previousEndKey, endKey, pitcherDiffCols)
        : [];
      const league = seasonBatters[0]?.league || seasonPitchers[0]?.league || "";

      $("teamName").textContent = state.team;
      $("league").textContent = league;
      const basisText = startKey === state.startDate ? "開始日時点からの差分" : `直前取得日 ${startKey} からの差分`;
      $("period").textContent = `${state.startDate} 〜 ${state.endDate}（${basisText}）`;
      renderSummary(
        seasonBatters, periodBatters, seasonPitchers, periodPitchers, recentPitchers,
        previousBatters, previousPitchers, previousRange, comparisonAvailable
      );
      renderBatters(seasonBatters, periodBatters);
      renderPitchers(seasonPitchers, periodPitchers);
      $("activeOnly").checked = state.activeOnly;
      document.querySelectorAll("[data-period]").forEach((button) => {
        button.classList.toggle("active", button.dataset.period === state.preset);
      });
      $("sortNote").textContent = state.sortOrder === "好調順"
        ? "選択期間の成績と起用量から判定"
        : `現在は「${state.sortOrder}」`;
      $("batterSortHint").textContent = state.view === "打者" ? state.sortOrder : "";
      $("pitcherSortHint").textContent = state.view === "投手" ? state.sortOrder : "";
      $("batterPanel").classList.toggle("hidden", state.view !== "打者");
      $("pitcherPanel").classList.toggle("hidden", state.view !== "投手");
      $("batterViewBtn").classList.toggle("active", state.view === "打者");
      $("pitcherViewBtn").classList.toggle("active", state.view === "投手");
    }

    ["team", "startDate", "endDate"].forEach((id) => {
      $(id).addEventListener("change", (event) => {
        state[id] = event.target.value;
        if (id === "startDate") {
          state.preset = "custom";
          if (state.startDate > state.endDate) state.endDate = state.startDate;
        }
        if (id === "endDate") {
          if (state.endDate < state.startDate) state.startDate = state.endDate;
          if (state.preset !== "custom") { setPeriodPreset(state.preset); return; }
        }
        render();
      });
    });
    $("sortOrder").addEventListener("change", (event) => { state.sortOrder = event.target.value; render(); });
    $("activeOnly").addEventListener("change", (event) => { state.activeOnly = event.target.checked; render(); });
    document.querySelectorAll("[data-period]").forEach((button) => {
      button.addEventListener("click", () => setPeriodPreset(button.dataset.period));
    });
    $("batterViewBtn").addEventListener("click", () => { state.view = "打者"; render(); });
    $("pitcherViewBtn").addEventListener("click", () => { state.view = "投手"; render(); });
    setPeriodPreset("7");
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
