function fmtRate(v){const n=Number(v);return Number.isFinite(n)?n.toFixed(3).replace(/^0/,""):"-"}function fmt2(v){const n=Number(v);return Number.isFinite(n)?n.toFixed(2):"-"}function fmtPct(v){const n=Number(v);return Number.isFinite(n)?`${(n*100).toFixed(1)}%`:"-"}function fmtInt(v){const n=Number(v);return Number.isFinite(n)?String(Math.round(n)):"-"}
function percentile(value,values,higher){const selected=Number(value);const pool=values.map(Number).filter(Number.isFinite);if(!Number.isFinite(selected)||!pool.length)return null;const favorable=pool.filter(v=>higher?v<selected:v>selected).length;const equal=pool.filter(v=>v===selected).length;return Math.round((favorable+equal*.5)/pool.length*100)}
function definitions(){return state.view==="batting"?[["OPS","ops",true,fmtRate],["打率","avg",true,fmtRate],["出塁率","obp",true,fmtRate],["長打率","slg",true,fmtRate],["本塁打","hr",true,fmtInt],["得点/試合","rpg",true,fmt2],["BB%","bbp",true,fmtPct],["打者K%","kp",false,fmtPct]]:[["防御率","era",false,fmt2],["WHIP","whip",false,fmt2],["投手K%","kp",true,fmtPct],["投手BB%","bbp",false,fmtPct],["被HR%","hrp",false,fmtPct],["K-BB%","kbb_pct",true,fmtPct]]}
function renderStandings(){const rows=DATA.standings.filter(r=>r.league===state.league).sort((a,b)=>num(a.rank)-num(b.rank));if(!rows.length){$("standingsPanel").innerHTML='<div class="empty">順位表を取得できませんでした。</div>';return}$("standingsPanel").innerHTML=`<div class="table-wrap"><table><thead><tr><th>順位</th><th>チーム</th><th>試合</th><th>勝</th><th>敗</th><th>分</th><th>勝率</th><th>差</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="rank">${r.rank}</td><td>${r.team}</td><td>${fmtInt(r.g)}</td><td>${fmtInt(r.w)}</td><td>${fmtInt(r.loss)}</td><td>${fmtInt(r.tie)}</td><td>${fmtRate(r.pct)}</td><td>${r.gb||"-"}</td></tr>`).join("")}</tbody></table></div>`}
function renderComparison(){const teams=DATA.teams.filter(t=>t.league===state.league);const kind=state.view==="batting"?"batting":"pitching";const defs=definitions();const sortKey=state.view==="batting"?"ops":"era";teams.sort((a,b)=>state.view==="batting"?num(b[kind][sortKey])-num(a[kind][sortKey]):num(a[kind][sortKey])-num(b[kind][sortKey]));$("comparisonPanel").innerHTML=teams.map(team=>`<article class="team-card"><div class="team-name">${team.team}</div><div class="metrics">${defs.map(([label,key,higher,format])=>{const score=percentile(team[kind][key],teams.map(t=>t[kind][key]),higher);const pct=score??0;const cls=pct>=67?"high":pct<=33?"low":"mid";return `<div class="metric-row ${cls}" style="--pct:${pct}"><div class="metric-label">${label}</div><div class="metric-value">${format(team[kind][key])}</div><div class="track"><i class="fill"></i></div><div class="score">${score??"-"}</div></div>`}).join("")}</div></article>`).join("")}
function render(){const standings=state.view==="standings";$("standingsPanel").classList.toggle("hidden",!standings);$("comparisonPanel").classList.toggle("hidden",standings);$("centralBtn").classList.toggle("active",state.league==="セントラル・リーグ");$("pacificBtn").classList.toggle("active",state.league==="パシフィック・リーグ");$("standingsBtn").classList.toggle("active",standings);$("battingBtn").classList.toggle("active",state.view==="batting");$("pitchingBtn").classList.toggle("active",state.view==="pitching");const leagueShort=state.league==="セントラル・リーグ"?"セ・リーグ":"パ・リーグ";$("title").textContent=standings?`${leagueShort}順位表`:`${leagueShort} ${state.view==="batting"?"チーム打撃":"チーム投手"}`;$("hint").textContent=standings?DATA.standingsDates[state.league]||"":`リーグ内パーセンタイル（6球団）`;$("dataDate").textContent=DATA.latestDate;$("notice").innerHTML=DATA.standingsErrors.length?'<div class="notice">NPB公式順位表を取得できなかったため、順位表は個人投手成績の勝敗合計からの推定です。チーム比較は最新個人成績の集計値です。</div>':"";standings?renderStandings():renderComparison()}
$("centralBtn").onclick=()=>{state.league="セントラル・リーグ";render()};$("pacificBtn").onclick=()=>{state.league="パシフィック・リーグ";render()};$("standingsBtn").onclick=()=>{state.view="standings";render()};$("battingBtn").onclick=()=>{state.view="batting";render()};$("pitchingBtn").onclick=()=>{state.view="pitching";render()};render();if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
