<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b5d75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>NPB 選手詳細</title>
  <style>
    :root { color-scheme: light; --bg:#f5f7f8; --surface:#fff; --panel:#edf3f5; --ink:#1d2429; --muted:#63707a; --line:#d9e1e5; --accent:#0b5d75; --soft:#dcecf1; --hot:#b93434; --shadow:0 10px 24px rgba(22,35,44,.08); }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; letter-spacing:0; }
    a { color:inherit; text-decoration:none; }
    header { padding:14px 14px 12px; background:var(--surface); border-bottom:1px solid var(--line); }
    .header-row { display:flex; align-items:center; justify-content:space-between; gap:10px; max-width:980px; margin:0 auto; }
    .header-actions { display:flex; gap:7px; }
    .nav-link { display:inline-flex; align-items:center; justify-content:center; min-height:38px; padding:7px 10px; border:1px solid var(--line); border-radius:8px; background:var(--surface); color:var(--accent); font-size:13px; font-weight:900; white-space:nowrap; }
    h1 { margin:0; font-size:20px; line-height:1.25; }
    .meta { margin-top:4px; color:var(--muted); font-size:11px; }
    .controls { position:sticky; top:0; z-index:5; padding:9px 12px; background:rgba(245,247,248,.96); border-bottom:1px solid var(--line); backdrop-filter:blur(10px); }
    .control-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; max-width:980px; margin:0 auto; }
    label { display:grid; gap:4px; color:var(--muted); font-size:11px; font-weight:800; }
    select { width:100%; min-height:40px; border:1px solid var(--line); border-radius:8px; background:var(--surface); color:var(--ink); padding:7px 28px 7px 9px; font-size:14px; }
    main { width:min(100%,980px); margin:0 auto; padding:14px 12px 30px; }
    .profile,.section { background:var(--surface); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); }
    .profile { padding:15px; }
    .profile-top { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .player-name { font-size:25px; font-weight:900; line-height:1.18; overflow-wrap:anywhere; }
    .team-name { margin-top:5px; color:var(--muted); font-size:13px; line-height:1.4; }
    .kind { padding:5px 9px; border-radius:999px; background:var(--soft); color:var(--accent); font-size:12px; font-weight:900; white-space:nowrap; }
    .basis { margin-top:12px; padding-top:10px; border-top:1px solid var(--line); color:var(--muted); font-size:12px; line-height:1.55; }
    .section { margin-top:12px; padding:14px; }
    .section-head { display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:10px; }
    h2 { margin:0; font-size:17px; }
    .section-note { color:var(--muted); font-size:11px; }
    .percentile-toggle { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:10px; }
    .percentile-toggle button { min-height:40px; border:1px solid var(--line); border-radius:8px; background:var(--surface); color:var(--ink); font-size:14px; font-weight:900; }
    .percentile-toggle button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .sample-note { margin-bottom:10px; padding:9px 10px; border-radius:8px; background:var(--panel); color:var(--muted); font-size:12px; line-height:1.5; }
    .sample-note.reference { background:#fff1dc; color:#80530d; border:1px solid #eccb94; font-weight:800; }
    .percentile-list { display:grid; gap:9px; }
    .percentile-row { display:grid; grid-template-columns:72px 1fr 42px; gap:9px; align-items:center; }
    .percentile-label { font-size:12px; font-weight:900; }
    .percentile-track { position:relative; height:12px; overflow:hidden; border-radius:999px; background:#dde3e7; }
    .percentile-fill { display:block; width:calc(var(--pct) * 1%); height:100%; border-radius:inherit; background:#6e8793; }
    .percentile-row.high .percentile-fill { background:#c43f45; }
    .percentile-row.low .percentile-fill { background:#397aa7; }
    .percentile-score { display:grid; place-items:center; width:38px; height:38px; border-radius:50%; background:#6e8793; color:#fff; font-size:13px; font-weight:900; font-variant-numeric:tabular-nums; }
    .percentile-row.high .percentile-score { background:#c43f45; }
    .percentile-row.low .percentile-score { background:#397aa7; }
    .metrics { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:7px; }
    .metric { min-width:0; padding:9px 8px; border-radius:8px; background:var(--panel); }
    .metric.primary { background:var(--soft); }
    .metric span { display:block; color:var(--muted); font-size:10px; font-weight:800; white-space:nowrap; }
    .metric b { display:block; margin-top:2px; font-size:17px; font-variant-numeric:tabular-nums; overflow-wrap:anywhere; }
    .metric.primary b { color:var(--hot); font-size:20px; }
    .table-wrap { overflow-x:auto; border:1px solid var(--line); border-radius:8px; }
    table { width:100%; min-width:520px; border-collapse:collapse; font-size:12px; }
    th,td { padding:9px 8px; border-bottom:1px solid var(--line); text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
    th { background:var(--panel); color:var(--muted); font-size:10px; }
    th:first-child,td:first-child { text-align:left; }
    tr:last-child td { border-bottom:0; }
    .empty { padding:28px 16px; color:var(--muted); text-align:center; }
    @media (min-width:720px) { header{padding-inline:24px}.controls{padding-inline:24px}.metrics{grid-template-columns:repeat(6,minmax(0,1fr))} }
  </style>
</head>
<body>
  <header><div class="header-row"><div><h1>選手詳細</h1><div class="meta">取得: 2026-07-23 21:28:38 / HTML生成: 2026-07-23 21:53:57</div></div><div class="header-actions"><a class="nav-link" href="javascript:history.back()">戻る</a><a class="nav-link" href="/">ホーム</a></div></div></header>
  <section class="controls"><div class="control-grid"><label>開始日<select id="startDate"></select></label><label>終了日<select id="endDate"></select></label></div></section>
  <main>
    <section class="profile"><div class="profile-top"><div><div id="playerName" class="player-name"></div><div id="teamName" class="team-name"></div></div><div id="kind" class="kind"></div></div><div id="basis" class="basis"></div></section>
    <section class="section"><div class="section-head"><h2>リーグ内パーセンタイル</h2><span class="section-note">0〜100</span></div><div class="percentile-toggle"><button type="button" id="seasonPctBtn" class="active">累積</button><button type="button" id="periodPctBtn">選択期間</button></div><div id="sampleNote" class="sample-note"></div><div id="percentiles" class="percentile-list"></div></section>
    <section class="section"><div class="section-head"><h2>終了日時点の累積成績</h2><span id="seasonDate" class="section-note"></span></div><div id="seasonStats" class="metrics"></div></section>
    <section class="section"><div class="section-head"><h2>選択期間の成績</h2><span id="periodLabel" class="section-note"></span></div><div id="periodStats" class="metrics"></div></section>
    <section class="section"><div class="section-head"><h2>累積成績の推移</h2><span class="section-note">取得日ごと</span></div><div id="history"></div></section>
  </main>
  <script src="npb-data.js"></script>
  <script>
    const DATA=window.NPB_DATA;
    const params=new URLSearchParams(location.search);
    const query={kind:params.get("kind")==="pitcher"?"pitcher":"batter",name:params.get("name")||"",team:params.get("team")||""};
    const rows=query.kind==="pitcher"?DATA.pitchers:DATA.batters;
    const playerRows=rows.filter(row=>row.name===query.name&&row.team===query.team).sort((a,b)=>a.date.localeCompare(b.date));
    const playerDates=[...new Set(playerRows.map(row=>row.date))].sort();
    const allDates=DATA.dates;
    const state={startDate:playerDates.includes(params.get("start"))?params.get("start"):playerDates[0]||allDates[0]||"",endDate:playerDates.includes(params.get("end"))?params.get("end"):playerDates.at(-1)||allDates.at(-1)||"",percentileMode:"season"};
    const $=id=>document.getElementById(id);
    const num=value=>Number.isFinite(Number(value))?Number(value):0;
    const div=(a,b)=>num(b)===0?null:num(a)/num(b);
    const playerKey=row=>`${row.name}|${row.team}|${row.league}`;
    const batterCols=["g","pa","ab","r","h","d2","d3","hr","tb","rbi","sb","cs","sh","sf","bb","ibb","hbp","so","gdp"];
    const pitcherCols=["g","w","loss","sv","hold","hp","cg","sho","nobb","bf","ip","h","hr","bb","ibb","hbp","so","wp","bk","r","er"];
    function optionList(select,values,selected){select.innerHTML="";values.forEach(value=>{const option=document.createElement("option");option.value=value;option.textContent=value;option.selected=value===selected;select.appendChild(option)})}
    function fmtRate(value){const n=Number(value);return Number.isFinite(n)?n.toFixed(3).replace(/^0/,""):""}
    function fmt2(value){const n=Number(value);return Number.isFinite(n)?n.toFixed(2):""}
    function fmtPct(value){const n=Number(value);return Number.isFinite(n)?`${(n*100).toFixed(1)}%`:""}
    function fmtInt(value){const n=Number(value);return Number.isFinite(n)?String(Math.round(n)):""}
    function inningsText(ip){const outs=Math.round(num(ip)*3);return outs%3?`${Math.floor(outs/3)}.${outs%3}`:String(Math.floor(outs/3))}
    function nearestDateOnOrBefore(target){return allDates.filter(date=>date<=target).at(-1)||""}
    function previousDateBefore(target){return allDates.filter(date=>date<target).at(-1)||""}
    function baselineDateFor(target){return previousDateBefore(target)||nearestDateOnOrBefore(target)}
    function snapshot(source,dateKey){const map=new Map();source.filter(row=>row.date===dateKey).forEach(row=>map.set(playerKey(row),row));return map}
    function diffRows(source,startKey,endKey,columns){const start=snapshot(source,startKey);const end=snapshot(source,endKey);const result=[];end.forEach((row,key)=>{const base=start.get(key)||{};const item={...row};columns.forEach(col=>item[col]=num(row[col])-num(base[col]));result.push(item)});return result}
    function calcBatters(source){
      const calculated=source.map(row=>{const avg=div(row.h,row.ab);const slg=div(row.tb,row.ab);const obp=div(num(row.h)+num(row.bb)+num(row.hbp),num(row.ab)+num(row.bb)+num(row.hbp)+num(row.sf));const ops=obp===null||slg===null?null:obp+slg;return{...row,avg,obp,slg,ops,iso:avg===null||slg===null?null:slg-avg,bbp:div(row.bb,row.pa),kp:div(row.so,row.pa),babip:div(num(row.h)-num(row.hr),num(row.ab)-num(row.so)-num(row.hr)+num(row.sf))}});
      const totals=new Map();calculated.forEach(row=>{const t=totals.get(row.league)||{h:0,bb:0,hbp:0,ab:0,sf:0,tb:0};["h","bb","hbp","ab","sf","tb"].forEach(key=>t[key]+=num(row[key]));totals.set(row.league,t)});
      const leagueOps=new Map();totals.forEach((t,league)=>{const obp=div(t.h+t.bb+t.hbp,t.ab+t.bb+t.hbp+t.sf);const slg=div(t.tb,t.ab);leagueOps.set(league,obp===null||slg===null?null:obp+slg)});
      return calculated.map(row=>({...row,opsPlus:leagueOps.get(row.league)?div(row.ops,leagueOps.get(row.league))*100:null}))
    }
    function calcPitchers(source){
      const calculated=source.map(row=>({...row,era:div(num(row.er)*9,row.ip),whip:div(num(row.h)+num(row.bb),row.ip),k9:div(num(row.so)*9,row.ip),kp:div(row.so,row.bf),bb9:div(num(row.bb)*9,row.ip),bbp:div(row.bb,row.bf),hr9:div(num(row.hr)*9,row.ip),hrp:div(row.hr,row.bf),kbb:div(row.so,row.bb),kbbPct:div(num(row.so)-num(row.bb),row.bf),fipPart:div(13*num(row.hr)+3*(num(row.bb)+num(row.hbp))-2*num(row.so),row.ip)}));
      const totals=new Map();calculated.forEach(row=>{const t=totals.get(row.league)||{ip:0,er:0,hr:0,bb:0,hbp:0,so:0};["ip","er","hr","bb","hbp","so"].forEach(key=>t[key]+=num(row[key]));totals.set(row.league,t)});
      const constants=new Map();totals.forEach((t,league)=>{const era=div(t.er*9,t.ip);const part=div(13*t.hr+3*(t.bb+t.hbp)-2*t.so,t.ip);constants.set(league,era===null||part===null?null:era-part)});
      return calculated.map(row=>({...row,fip:constants.get(row.league)===null||row.fipPart===null?null:row.fipPart+constants.get(row.league)}))
    }
    function selectedRow(calculated){return calculated.find(row=>row.name===query.name&&row.team===query.team)||null}
    function percentileMetrics(){return query.kind==="batter"?[["OPS","ops",true],["打率","avg",true],["出塁率","obp",true],["長打率","slg",true],["IsoP","iso",true],["BB%","bbp",true],["打者K%","kp",false],["BABIP","babip",true]]:[["防御率","era",false],["WHIP","whip",false],["FIP風","fip",false],["投手K%","kp",true],["投手BB%","bbp",false],["被HR%","hrp",false],["K/BB","kbb",true],["K-BB%","kbbPct",true]]}
    function percentile(value,pool,higherIsBetter){const selected=Number(value);const values=pool.map(Number).filter(Number.isFinite);if(!Number.isFinite(selected)||!values.length)return null;const favorable=values.filter(v=>higherIsBetter?v<selected:v>selected).length;const equal=values.filter(v=>v===selected).length;return Math.max(0,Math.min(100,Math.round((favorable+equal*.5)/values.length*100)))}
    function renderPercentiles(row,population){
      if(!row){$("percentiles").innerHTML='<div class="empty">表示できる比較データがありません。</div>';return}
      const min=query.kind==="batter"?50:10;const sample=query.kind==="batter"?num(row.pa):num(row.ip);const unit=query.kind==="batter"?"打席":"投球回";const qualified=sample>=min;
      const leaguePool=population.filter(item=>item.league===row.league&&(query.kind==="batter"?num(item.pa)>=min:num(item.ip)>=min));
      $("sampleNote").classList.toggle("reference",!qualified);
      $("sampleNote").textContent=qualified?`${row.league}内の基準到達者（打者50打席以上／投手10投球回以上）${leaguePool.length}人と比較`:`参考値：${sample.toFixed(query.kind==="batter"?0:1)}${unit}のため標本が少なく、パーセンタイルは変動しやすい値です。比較母集団は${row.league}の基準到達者${leaguePool.length}人です。`;
      $("percentiles").innerHTML=percentileMetrics().map(([label,key,higher])=>{const score=percentile(row[key],leaguePool.map(item=>item[key]),higher);const pct=score===null?0:score;const cls=pct>=67?"high":pct<=33?"low":"mid";return `<div class="percentile-row ${cls}" style="--pct:${pct}"><div class="percentile-label">${label}</div><div class="percentile-track"><i class="percentile-fill"></i></div><div class="percentile-score">${score===null?"-":score}</div></div>`}).join("");
    }
    function metricCard(label,value,primary=false){return `<div class="metric${primary?" primary":""}"><span>${label}</span><b>${value}</b></div>`}
    function batterItems(row){if(!row)return[];return [["OPS",fmtRate(row.ops),true],["打率",fmtRate(row.avg),true],["出塁率",fmtRate(row.obp),true],["長打率",fmtRate(row.slg),true],["IsoP",fmtRate(row.iso)],["OPS+風",fmtInt(row.opsPlus)],["試合",fmtInt(row.g)],["打席",fmtInt(row.pa)],["打数",fmtInt(row.ab)],["得点",fmtInt(row.r)],["安打",fmtInt(row.h)],["二塁打",fmtInt(row.d2)],["三塁打",fmtInt(row.d3)],["本塁打",fmtInt(row.hr)],["塁打",fmtInt(row.tb)],["打点",fmtInt(row.rbi)],["盗塁",fmtInt(row.sb)],["盗塁刺",fmtInt(row.cs)],["犠打",fmtInt(row.sh)],["犠飛",fmtInt(row.sf)],["四球",fmtInt(row.bb)],["故意四",fmtInt(row.ibb)],["死球",fmtInt(row.hbp)],["三振",fmtInt(row.so)],["併殺打",fmtInt(row.gdp)],["BB%",fmtPct(row.bbp)],["K%",fmtPct(row.kp)],["BABIP",fmtRate(row.babip)]]}
    function pitcherItems(row){if(!row)return[];return [["防御率",fmt2(row.era),true],["WHIP",fmt2(row.whip),true],["FIP風",fmt2(row.fip),true],["投手K%",fmtPct(row.kp),true],["投手BB%",fmtPct(row.bbp)],["被HR%",fmtPct(row.hrp)],["K/9",fmt2(row.k9)],["BB/9",fmt2(row.bb9)],["HR/9",fmt2(row.hr9)],["K/BB",fmt2(row.kbb)],["K-BB%",fmtPct(row.kbbPct)],["登板",fmtInt(row.g)],["勝利",fmtInt(row.w)],["敗北",fmtInt(row.loss)],["セーブ",fmtInt(row.sv)],["ホールド",fmtInt(row.hold)],["HP",fmtInt(row.hp)],["完投",fmtInt(row.cg)],["完封",fmtInt(row.sho)],["打者",fmtInt(row.bf)],["投球回",inningsText(row.ip)],["被安打",fmtInt(row.h)],["被本塁打",fmtInt(row.hr)],["与四球",fmtInt(row.bb)],["故意四",fmtInt(row.ibb)],["与死球",fmtInt(row.hbp)],["奪三振",fmtInt(row.so)],["暴投",fmtInt(row.wp)],["ボーク",fmtInt(row.bk)],["失点",fmtInt(row.r)],["自責点",fmtInt(row.er)]]}
    function renderItems(target,items){target.innerHTML=items.length?items.map(([label,value,primary])=>metricCard(label,value,primary)).join(""):'<div class="empty">表示できる成績がありません。</div>'}
    function renderHistory(){if(!playerRows.length){$("history").innerHTML='<div class="empty">履歴がありません。</div>';return}const body=playerRows.map(row=>{if(query.kind==="batter"){const calc=calcBatters([row])[0];return `<tr><td>${row.date}</td><td>${fmtInt(row.g)}</td><td>${fmtInt(row.pa)}</td><td>${fmtRate(calc.avg)}</td><td>${fmtInt(row.hr)}</td><td>${fmtInt(row.rbi)}</td><td>${fmtRate(calc.ops)}</td></tr>`}const calc=calcPitchers([row])[0];return `<tr><td>${row.date}</td><td>${fmtInt(row.g)}</td><td>${inningsText(row.ip)}</td><td>${fmt2(calc.era)}</td><td>${fmtInt(row.so)}</td><td>${fmt2(calc.whip)}</td></tr>`}).join("");const head=query.kind==="batter"?"<tr><th>取得日</th><th>試合</th><th>打席</th><th>打率</th><th>HR</th><th>打点</th><th>OPS</th></tr>":"<tr><th>取得日</th><th>登板</th><th>投球回</th><th>防御率</th><th>奪三振</th><th>WHIP</th></tr>";$("history").innerHTML=`<div class="table-wrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`}
    function render(){
      optionList($("startDate"),playerDates,state.startDate);optionList($("endDate"),playerDates,state.endDate);
      if(!playerRows.length){$("playerName").textContent="選手が見つかりません";$("teamName").textContent="ランキングまたはチーム状況から選び直してください。";$("kind").textContent=query.kind==="batter"?"打者":"投手";renderItems($("seasonStats"),[]);renderItems($("periodStats"),[]);renderHistory();return}
      const endKey=nearestDateOnOrBefore(state.endDate);const startKey=baselineDateFor(state.startDate);const columns=query.kind==="batter"?batterCols:pitcherCols;const calculator=query.kind==="batter"?calcBatters:calcPitchers;
      const seasonPopulation=calculator(Array.from(snapshot(rows,endKey).values()));const periodPopulation=calculator(diffRows(rows,startKey,endKey,columns));
      const season=selectedRow(seasonPopulation);let period=selectedRow(periodPopulation);
      if(!period&&season){const zero={...season};columns.forEach(key=>zero[key]=0);period=calculator([zero])[0]}
      $("playerName").textContent=query.name;$("teamName").textContent=`${query.team} / ${season?.league||playerRows.at(-1)?.league||""}`;$("kind").textContent=query.kind==="batter"?"打者":"投手";
      const basisText=startKey===state.startDate?"開始日時点を基準":`直前取得日 ${startKey} を基準`;$("basis").textContent=`${state.startDate} 〜 ${state.endDate}（${basisText}に終了日時点との差分を計算）`;$("seasonDate").textContent=endKey;$("periodLabel").textContent=`${state.startDate} 〜 ${state.endDate}`;
      renderItems($("seasonStats"),query.kind==="batter"?batterItems(season):pitcherItems(season));renderItems($("periodStats"),query.kind==="batter"?batterItems(period):pitcherItems(period));renderHistory()
      renderPercentiles(state.percentileMode==="season"?season:period,state.percentileMode==="season"?seasonPopulation:periodPopulation);$("seasonPctBtn").classList.toggle("active",state.percentileMode==="season");$("periodPctBtn").classList.toggle("active",state.percentileMode==="period")
    }
    ["startDate","endDate"].forEach(id=>{$(id).addEventListener("change",event=>{state[id]=event.target.value;if(id==="startDate"&&state.startDate>state.endDate)state.endDate=state.startDate;if(id==="endDate"&&state.endDate<state.startDate)state.startDate=state.endDate;render()})});
    $("seasonPctBtn").addEventListener("click",()=>{state.percentileMode="season";render()});$("periodPctBtn").addEventListener("click",()=>{state.percentileMode="period";render()});
    render();if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
  </script>
</body>
</html>
