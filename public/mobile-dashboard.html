<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d5c75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NPB Status">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>NPB 2026 Mobile Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #eef4f7;
      --ink: #1e242b;
      --muted: #66717d;
      --line: #d8e0e6;
      --accent: #0d5c75;
      --accent-2: #b93535;
      --shadow: 0 10px 24px rgba(21, 35, 45, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }
    header {
      padding: 18px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .home-link, .detail-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--accent);
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }
    h1 { margin: 0 0 8px; font-size: 20px; line-height: 1.25; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; color: var(--muted); font-size: 12px; }
    .controls {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 10px 12px 12px;
      background: rgba(246, 247, 249, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      max-width: 980px;
      margin: 0 auto;
    }
    label { display: grid; gap: 4px; color: var(--muted); font-size: 11px; font-weight: 700; }
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      padding: 7px 28px 7px 9px;
      font-size: 14px;
    }
    .kind-toggle { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
    }
    button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .date-field.hidden { display: none; }
    main { width: min(100%, 980px); margin: 0 auto; padding: 14px 12px 24px; }
    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .summary strong { color: var(--ink); }
    .cards { display: grid; gap: 10px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px;
    }
    .topline { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; }
    .rank {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface-2);
      color: var(--accent);
      font-weight: 900;
    }
    .name { min-width: 0; font-size: 18px; font-weight: 900; line-height: 1.2; overflow-wrap: anywhere; }
    .primary { color: var(--accent-2); font-size: 22px; font-weight: 900; font-variant-numeric: tabular-nums; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 7px; margin-top: 12px; }
    .stat { min-width: 0; padding: 8px 7px; background: var(--surface-2); border-radius: 8px; }
    .stat span { display: block; color: var(--muted); font-size: 10px; font-weight: 800; white-space: nowrap; }
    .stat b { display: block; margin-top: 2px; font-size: 15px; font-variant-numeric: tabular-nums; overflow-wrap: anywhere; }
    .card-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
    .empty { padding: 24px 16px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; color: var(--muted); text-align: center; }
    @media (min-width: 720px) {
      header { padding-inline: 24px; }
      .controls { padding-inline: 24px; }
      .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .kind-toggle { grid-column: auto; grid-template-columns: 1fr 1fr; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>NPB 2026 個人成績</h1>
        <div class="meta">
          <span>取得: 2026-07-24 18:34:04</span>
          <span>HTML生成: 2026-07-24 18:34:29</span>
        </div>
      </div>
      <a class="home-link" href="/">ホーム</a>
    </div>
  </header>

  <section class="controls">
    <div class="grid">
      <div class="kind-toggle">
        <button type="button" id="batterBtn" class="active">打者</button>
        <button type="button" id="pitcherBtn">投手</button>
      </div>
      <label>チーム<select id="team"></select></label>
      <label>リーグ<select id="league"></select></label>
      <label>表示<select id="mode"></select></label>
      <label id="startField" class="date-field">開始日<select id="startDate"></select></label>
      <label id="endField" class="date-field">終了日<select id="endDate"></select></label>
      <label>指標<select id="metric"></select></label>
      <label>最低条件<select id="minimum"></select></label>
    </div>
  </section>

  <main>
    <div class="summary">
      <div><strong id="title"></strong><br><span id="condition"></span></div>
      <div id="count"></div>
    </div>
    <div id="cards" class="cards"></div>
  </main>

  <script src="npb-data.js"></script>
  <script>
    const DATA = window.NPB_DATA;
    const state = {
      kind: "打者",
      team: "全チーム",
      league: "全リーグ",
      mode: "累積",
      metric: "OPS",
      minimum: "50",
      startDate: DATA.options.dates.at(-1) || "",
      endDate: DATA.options.dates.at(-1) || ""
    };
    const $ = (id) => document.getElementById(id);
    const num = (value) => Number.isFinite(Number(value)) ? Number(value) : 0;
    const div = (a, b) => num(b) === 0 ? null : num(a) / num(b);
    const playerKey = (row) => `${row.name}|${row.team}|${row.league}`;

    function optionList(select, values, selected) {
      select.innerHTML = "";
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        if (value === selected) option.selected = true;
        select.appendChild(option);
      });
    }

    function fmtRate(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      return n.toFixed(3).replace(/^0/, "");
    }
    function fmt2(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      return n.toFixed(2);
    }
    function fmtPct(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      return (n * 100).toFixed(1) + "%";
    }
    function fmtInt(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      return Math.round(n).toString();
    }
    function fmtPlain(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "number" && Number.isInteger(value)) return String(value);
      return String(value);
    }
    function inningsText(ip) {
      const outs = Math.round(num(ip) * 3);
      const whole = Math.floor(outs / 3);
      const rest = outs % 3;
      return rest === 0 ? String(whole) : `${whole}.${rest}`;
    }

    function previousDateBefore(target) {
      const dates = DATA.options.dates.filter((d) => d < target);
      return dates.length ? dates[dates.length - 1] : "";
    }
    function nearestDateOnOrBefore(target) {
      const dates = DATA.options.dates.filter((d) => d <= target);
      return dates.length ? dates[dates.length - 1] : "";
    }
    function keysForMode() {
      if (state.mode === "累積") {
        const latest = DATA.options.dates.at(-1) || "";
        return [latest, latest];
      }
      const baseline = previousDateBefore(state.startDate) || nearestDateOnOrBefore(state.startDate);
      return [baseline, nearestDateOnOrBefore(state.endDate)];
    }

    function snapshot(rows, dateKey) {
      if (!dateKey || dateKey === "START") return new Map();
      const map = new Map();
      rows.filter((row) => row.date === dateKey).forEach((row) => map.set(playerKey(row), row));
      return map;
    }

    function diffRows(rows, startKey, endKey, diffColumns) {
      const end = snapshot(rows, endKey);
      const start = snapshot(rows, startKey);
      const result = [];
      end.forEach((row, key) => {
        const base = start.get(key) || {};
        const item = {...row};
        diffColumns.forEach((col) => item[col] = num(row[col]) - num(base[col]));
        result.push(item);
      });
      return result;
    }

    function calculateBatters(rows) {
      const calculated = rows.map((row) => {
        const avg = div(row.h, row.ab);
        const slg = div(row.tb, row.ab);
        const obp = div(num(row.h) + num(row.bb) + num(row.hbp), num(row.ab) + num(row.bb) + num(row.hbp) + num(row.sf));
        const ops = obp === null || slg === null ? null : obp + slg;
        const iso = slg === null || avg === null ? null : slg - avg;
        const bbp = div(row.bb, row.pa);
        const kp = div(row.so, row.pa);
        const babip = div(num(row.h) - num(row.hr), num(row.ab) - num(row.so) - num(row.hr) + num(row.sf));
        return {...row, avg, slg, obp, ops, iso, bbp, kp, babip};
      });
      const leagueTotals = new Map();
      calculated.forEach((row) => {
        const total = leagueTotals.get(row.league) || {h: 0, bb: 0, hbp: 0, ab: 0, sf: 0, tb: 0};
        total.h += num(row.h); total.bb += num(row.bb); total.hbp += num(row.hbp);
        total.ab += num(row.ab); total.sf += num(row.sf); total.tb += num(row.tb);
        leagueTotals.set(row.league, total);
      });
      const leagueOps = new Map();
      leagueTotals.forEach((t, league) => {
        const obp = div(t.h + t.bb + t.hbp, t.ab + t.bb + t.hbp + t.sf);
        const slg = div(t.tb, t.ab);
        leagueOps.set(league, obp === null || slg === null ? null : obp + slg);
      });
      return calculated.map((row) => {
        const lop = leagueOps.get(row.league);
        return {...row, opsPlus: lop ? div(row.ops, lop) * 100 : null};
      });
    }

    function calculatePitchers(rows) {
      const calculated = rows.map((row) => {
        const era = div(num(row.er) * 9, row.ip);
        const whip = div(num(row.h) + num(row.bb), row.ip);
        const k9 = div(num(row.so) * 9, row.ip);
        const bb9 = div(num(row.bb) * 9, row.ip);
        const hr9 = div(num(row.hr) * 9, row.ip);
        const kbb = div(row.so, row.bb);
        const kbbPct = div(num(row.so) - num(row.bb), row.bf);
        const fipPart = div(13 * num(row.hr) + 3 * (num(row.bb) + num(row.hbp)) - 2 * num(row.so), row.ip);
        return {...row, era, whip, k9, bb9, hr9, kbb, kbbPct, fipPart, ipText: inningsText(row.ip)};
      });
      const leagueTotals = new Map();
      calculated.forEach((row) => {
        const total = leagueTotals.get(row.league) || {ip: 0, er: 0, hr: 0, bb: 0, hbp: 0, so: 0};
        total.ip += num(row.ip); total.er += num(row.er); total.hr += num(row.hr);
        total.bb += num(row.bb); total.hbp += num(row.hbp); total.so += num(row.so);
        leagueTotals.set(row.league, total);
      });
      const constants = new Map();
      leagueTotals.forEach((t, league) => {
        const era = div(t.er * 9, t.ip);
        const component = div(13 * t.hr + 3 * (t.bb + t.hbp) - 2 * t.so, t.ip);
        constants.set(league, era === null || component === null ? null : era - component);
      });
      return calculated.map((row) => {
        const constant = constants.get(row.league);
        return {...row, fip: constant === null || row.fipPart === null ? null : row.fipPart + constant};
      });
    }

    function rowsForCurrentState() {
      const [startKey, endKey] = keysForMode();
      if (state.kind === "打者") {
        const diffCols = ["g", "pa", "ab", "r", "h", "d2", "d3", "hr", "tb", "rbi", "sb", "cs", "sh", "sf", "bb", "ibb", "hbp", "so", "gdp"];
        return calculateBatters(diffRows(DATA.batters, state.mode === "累積" ? "START" : startKey, endKey, diffCols));
      }
      const diffCols = ["g", "w", "loss", "sv", "hold", "hp", "cg", "sho", "nobb", "bf", "ip", "h", "hr", "bb", "ibb", "hbp", "so", "wp", "bk", "r", "er"];
      return calculatePitchers(diffRows(DATA.pitchers, state.mode === "累積" ? "START" : startKey, endKey, diffCols));
    }

    function metricValue(row) {
      if (state.kind === "打者") {
        return {
          "OPS": row.ops, "OPS+風": row.opsPlus, "打率": row.avg,
          "出塁率": row.obp, "長打率": row.slg, "IsoP": row.iso
        }[state.metric];
      }
      return {
        "FIP風": row.fip, "WHIP": row.whip, "防御率": row.era,
        "K/9": row.k9, "K-BB%": row.kbbPct, "K/BB": row.kbb
      }[state.metric];
    }

    function ascendingMetric() {
      return state.kind === "投手" && ["FIP風", "WHIP", "防御率"].includes(state.metric);
    }

    function passesMinimum(row, allBatters) {
      if (state.kind === "打者") {
        if (state.minimum === "なし") return num(row.pa) > 0;
        if (state.minimum === "規定打席風") {
          const teamGames = Math.max(...allBatters.filter((b) => b.team === row.team).map((b) => num(b.g)), 0);
          return num(row.pa) >= teamGames * 3.1;
        }
        return num(row.pa) >= Number(state.minimum);
      }
      if (state.minimum === "なし") return num(row.ip) > 0;
      if (state.minimum === "規定投球回風") {
        const teamGames = Math.max(...allBatters.filter((b) => b.team === row.team).map((b) => num(b.g)), 0);
        return num(row.ip) >= teamGames;
      }
      return num(row.ip) >= Number(state.minimum);
    }

    function filteredRankedRows() {
      const rows = rowsForCurrentState();
      const [startKey, endKey] = keysForMode();
      const batterDiffCols = ["g", "pa", "ab", "r", "h", "d2", "d3", "hr", "tb", "rbi", "sb", "cs", "sh", "sf", "bb", "ibb", "hbp", "so", "gdp"];
      const allBatters = calculateBatters(diffRows(DATA.batters, state.mode === "累積" ? "START" : startKey, endKey, batterDiffCols));
      return rows
        .filter((row) => state.team === "全チーム" || row.team === state.team)
        .filter((row) => state.league === "全リーグ" || row.league === state.league)
        .filter((row) => Number.isFinite(Number(metricValue(row))))
        .filter((row) => passesMinimum(row, allBatters))
        .sort((a, b) => {
          const av = Number(metricValue(a));
          const bv = Number(metricValue(b));
          if (av !== bv) return ascendingMetric() ? av - bv : bv - av;
          return state.kind === "打者" ? num(b.pa) - num(a.pa) : num(b.ip) - num(a.ip);
        })
        .slice(0, 30)
        .map((row, index) => ({...row, rank: index + 1}));
    }

    function primaryValue(row) {
      if (state.kind === "打者") {
        if (state.metric === "OPS+風") return fmtInt(row.opsPlus);
        if (state.metric === "打率") return fmtRate(row.avg);
        if (state.metric === "出塁率") return fmtRate(row.obp);
        if (state.metric === "長打率") return fmtRate(row.slg);
        if (state.metric === "IsoP") return fmtRate(row.iso);
        return fmtRate(row.ops);
      }
      if (state.metric === "防御率") return fmt2(row.era);
      if (state.metric === "WHIP") return fmt2(row.whip);
      if (state.metric === "K/9") return fmt2(row.k9);
      if (state.metric === "K-BB%") return fmtPct(row.kbbPct);
      if (state.metric === "K/BB") return fmt2(row.kbb);
      return fmt2(row.fip);
    }
    function detailUrl(row) {
      const params = new URLSearchParams({
        kind: state.kind === "打者" ? "batter" : "pitcher",
        name: row.name || "",
        team: row.team || "",
        start: state.mode === "期間" ? state.startDate : DATA.options.dates[0] || "",
        end: state.mode === "期間" ? state.endDate : DATA.options.dates.at(-1) || ""
      });
      return `/player-detail.html?${params.toString()}`;
    }

    function statItems(row) {
      if (state.kind === "打者") {
        return [
          ["試合", fmtPlain(row.g)], ["打席", fmtPlain(row.pa)], ["打率", fmtRate(row.avg)],
          ["出塁率", fmtRate(row.obp)], ["長打率", fmtRate(row.slg)], ["OPS", fmtRate(row.ops)],
          ["OPS+風", fmtInt(row.opsPlus)]
        ];
      }
      return [
        ["登板", fmtPlain(row.g)], ["投球回", fmtPlain(row.ipText)], ["防御率", fmt2(row.era)],
        ["WHIP", fmt2(row.whip)], ["K/9", fmt2(row.k9)], ["K-BB%", fmtPct(row.kbbPct)],
        ["FIP風", fmt2(row.fip)]
      ];
    }

    function syncControls() {
      optionList($("team"), DATA.options.teams, state.team);
      optionList($("league"), DATA.options.leagues, state.league);
      optionList($("mode"), DATA.options.modes, state.mode);
      optionList($("startDate"), DATA.options.dates, state.startDate);
      optionList($("endDate"), DATA.options.dates, state.endDate);
      const metrics = state.kind === "打者" ? DATA.options.batterMetrics : DATA.options.pitcherMetrics;
      const minimums = state.kind === "打者" ? DATA.options.batterMin : DATA.options.pitcherMin;
      if (!metrics.includes(state.metric)) state.metric = metrics[0] || "";
      if (!minimums.includes(state.minimum)) state.minimum = minimums[0] || "";
      optionList($("metric"), metrics, state.metric);
      optionList($("minimum"), minimums, state.minimum);
      $("batterBtn").classList.toggle("active", state.kind === "打者");
      $("pitcherBtn").classList.toggle("active", state.kind === "投手");
      const period = state.mode === "期間";
      $("startField").classList.toggle("hidden", !period);
      $("endField").classList.toggle("hidden", !period);
    }

    function render() {
      syncControls();
      const rows = filteredRankedRows();
      $("title").textContent = `${state.kind}ランキング（${state.metric}）`;
      const periodText = state.mode === "累積" ? "累積" : `${state.startDate} 〜 ${state.endDate}`;
      $("condition").textContent = `${state.team} / ${state.league} / ${periodText} / 最低条件: ${state.minimum}`;
      $("count").textContent = `${rows.length}件`;

      const cards = $("cards");
      cards.innerHTML = "";
      if (!rows.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "条件に合うランキングがありません。";
        cards.appendChild(empty);
        return;
      }
      rows.forEach((row) => {
        const card = document.createElement("article");
        card.className = "card";
        const stats = statItems(row).map(([label, value]) => `
          <div class="stat"><span>${label}</span><b>${value}</b></div>
        `).join("");
        card.innerHTML = `
          <div class="topline">
            <div class="rank">${row.rank}</div>
            <div>
              <div class="name">${row.name || ""}</div>
              <div class="sub">${row.team || ""}<br>${row.league || ""}</div>
            </div>
            <div class="primary">${primaryValue(row)}</div>
          </div>
          <div class="stats">${stats}</div>
          <div class="card-actions"><a class="detail-link" href="${detailUrl(row)}">詳しい成績</a></div>
        `;
        cards.appendChild(card);
      });
    }

    $("batterBtn").addEventListener("click", () => { state.kind = "打者"; state.metric = "OPS"; state.minimum = "50"; render(); });
    $("pitcherBtn").addEventListener("click", () => { state.kind = "投手"; state.metric = "FIP風"; state.minimum = "10"; render(); });
    ["team", "league", "mode", "startDate", "endDate", "metric", "minimum"].forEach((id) => {
      $(id).addEventListener("change", (event) => {
        state[id] = event.target.value;
        render();
      });
    });
    render();
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
